<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканер утечек в коде</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main-container">
        <h1 class="main-title">Сканер утечек в коде</h1>
        <div class="section-label">Введите директорию для сканирования</div>
        <input type="text" class="input-field" placeholder="Путь к директории">
        
        <div class="mode-label">Выберите уровень агрессивности проверки</div>
        <div class="mode-buttons">
            <button class="mode-btn">Precise</button>
            <button class="mode-btn">Medium</button>
            <button class="mode-btn">Aggressive</button>
        </div>
        
        <button class="export-btn-left">Перевести в JSON</button>
        <button class="export-btn-right">Перевести в Excel</button>
        
        <div class="decor-line"></div>
    </div>
</body>
</html>
