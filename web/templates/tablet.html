<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Scan Results</title>

<link rel="stylesheet" href="/static/style.css">

<style>

body{
    font-family: Arial;
    margin:40px;
}

h1{
    margin-bottom:10px;
}

table{
    border-collapse:collapse;
    width:100%;
}

th, td{
    border:1px solid #ccc;
    padding:8px;
    text-align:left;
}

th{
    background:#f2f2f2;
}

tr:hover{
    background:#f9f9f9;
}

.count{
    margin-bottom:20px;
    font-size:18px;
}

</style>

</head>

<body>

<h1>Secret Scan Results</h1>

<div class="count">
Found <strong>{{ count }}</strong> potential leaks
</div>

<table>

<tr>
<th>File</th>
<th>Line</th>
<th>Content</th>
<th>Type</th>
<th>Severity</th>
<th>Entropy</th>
</tr>

{% for r in results %}

<tr>
<td>{{ r.filename }}</td>
<td>{{ r.num }}</td>
<td>{{ r.line }}</td>
<td>{{ r.type }}</td>
<td>{{ r.imp }}</td>
<td>{{ r.ent }}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/">← Run another scan</a>

</body>
</html>
